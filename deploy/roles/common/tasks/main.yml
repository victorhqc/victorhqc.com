---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name:
      - nginx
      - sqlite3
      - unzip
      - curl
    state: present

- name: Ensure app group exists
  become: true
  ansible.builtin.group:
    name: "{{ app_group }}"
    state: present

- name: Ensure app user exists
  become: true
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Add deploy user to app group (for file access)
  become: true
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: "{{ app_group }}"
    append: true

- name: Create config directory
  become: true
  ansible.builtin.file:
    path: "{{ config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create API deploy directory
  become: true
  ansible.builtin.file:
    path: "{{ api_deploy_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Create web deploy directory
  become: true
  ansible.builtin.file:
    path: "{{ web_deploy_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
