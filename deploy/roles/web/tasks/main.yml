---
- name: Deploy web environment file
  become: true
  ansible.builtin.template:
    src: website.env.j2
    dest: "{{ config_dir }}/website.env"
    owner: root
    group: root
    mode: "0600"
  notify: restart web

- name: Deploy web systemd service
  become: true
  ansible.builtin.template:
    src: victorhqc-web.service.j2
    dest: "/etc/systemd/system/{{ web_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon reload web
    - restart web

- name: Enable web service
  become: true
  ansible.builtin.systemd:
    name: "{{ web_service_name }}"
    enabled: true
    daemon_reload: true

- name: Upload web binary
  become: true
  ansible.builtin.copy:
    src: "{{ project_root }}/target/{{ rust_target }}/release/web-victorhqc-com"
    dest: "{{ web_deploy_dir }}/web-victorhqc-com"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  notify: restart web
  tags: [deploy]

- name: Upload web_files.zip
  become: true
  ansible.builtin.copy:
    src: "{{ project_root }}/web/web_files.zip"
    dest: "/tmp/web_files.zip"
    mode: "0600"
  tags: [deploy]

- name: Remove stale web assets
  become: true
  ansible.builtin.file:
    path: "{{ web_deploy_dir }}/{{ item }}"
    state: absent
  loop:
    - templates
    - static
    - public
  tags: [deploy]

- name: Extract web assets
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/web_files.zip"
    dest: "{{ web_deploy_dir }}"
    remote_src: true
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
  notify: restart web
  tags: [deploy]

- name: Clean up web_files.zip from tmp
  ansible.builtin.file:
    path: "/tmp/web_files.zip"
    state: absent
  tags: [deploy]

- name: Upload regexes.yaml
  become: true
  ansible.builtin.copy:
    src: "{{ project_root }}/web/regexes.yaml"
    dest: "{{ web_deploy_dir }}/regexes.yaml"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  tags: [deploy]
