{% import "_components/simple_photo.html" as c %}

<div
  hx-trigger="load"
  hx-get="/analytics?p=/collection/{{ collection_route.name }}"
  hx-headers='js:{"x-visitor-id": localStorage.getItem("client_id")}'>
</div>
<div class="portfolio-collection">
  <div class="portfolio-collection__sizer"></div>
  {% for data in portfolio_photos %}
  <div class="portfolio-collection__list_item">{{ c::simple_photo(data=data, size="Sm", class="portfolio-collection__photo") }}</div>
  {% endfor %}
</div>

<script>
(function() {
  if (window.__active_collection__) {
    delete window.__active_collection__;
  }

  window.__active_collection__ = {{ collection_route | json_encode() | safe }};
  document.title = `victorhqc.com - Photography Portfolio`;
})();
</script>
{% if not is_mobile %}
<script>
  initMasonry();

  function initMasonry() {
    const elem = document.querySelector('.portfolio-collection');
    new Masonry(elem, {
      itemSelector: '.portfolio-collection__list_item',
      percentPosition: true,
      gutter: 10,
      transitionDuration: 0,
    });

  }
</script>
{% endif %}
<script>
  (function() {
    CLEANUP_EXISTING_LISTENERS();
  })();

</script>
