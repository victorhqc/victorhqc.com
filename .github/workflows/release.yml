name: Release

on:
    push:
        tags:
            - "v*"
        paths-ignore:
            - "**/Cargo.toml"

env:
    CARGO_TERM_COLOR: always
    RUSTC_WRAPPER: sccache
    SCCACHE_CACHE_SIZE: 2G
    SQLX_OFFLINE: true

jobs:
    build_and_release:
        name: Build and Release
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      api_artifact_name: linux-api-victorhqc-com
                      web_artifact_name: linux-web-victorhqc-com

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install musl tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y musl-tools

            - name: Setup sccache
              uses: mozilla-actions/sccache-action@v0.0.9

            - name: Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: "rust-cache"
                  cache-on-failure: true

            - name: Cache sqlx-cli
              uses: actions/cache@v4
              id: cache-sqlx
              with:
                  path: |
                      ~/.cargo/bin/sqlx
                      ~/.cargo/bin/cargo-sqlx
                  key: ${{ runner.os }}-sqlx-cli-0.8.6

            - name: Install sqlx-cli
              if: steps.cache-sqlx.outputs.cache-hit != 'true'
              run: |
                  cargo install sqlx-cli \
                    --version 0.8.6 \
                    --no-default-features \
                    --features sqlite \
                    --locked

            - name: Build Release Binary
              run: cargo build --workspace --exclude cli-victorhqc-com --release --target ${{ matrix.target }}

            - name: Rename binaries
              shell: bash
              run: |
                  mv target/${{ matrix.target }}/release/api-victorhqc-com ${{ matrix.api_artifact_name }}
                  mv target/${{ matrix.target }}/release/web-victorhqc-com ${{ matrix.web_artifact_name }}

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      ${{ matrix.api_artifact_name }}
                      ${{ matrix.web_artifact_name }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
